<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>출산 준비 체크리스트 · 노진명 & 와이프</title>
<style>
  :root {
    --bg: #f7f5f2;
    --card: #ffffff;
    --text: #2c2c2c;
    --muted: #6b7280;
    --border: #e5e7eb;
    --accent: #d97757;
    --accent-soft: #fdf3ee;
    --done: #10b981;
    --warn: #f59e0b;
    --danger: #ef4444;
    --c-admin: #3b82f6;
    --c-medical: #ec4899;
    --c-work: #6b7280;
    --c-money: #f59e0b;
    --c-family: #10b981;
    --c-life: #8b5cf6;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
  }
  header {
    background: linear-gradient(135deg, #d97757 0%, #e89e7c 100%);
    color: white;
    padding: 2rem 1.25rem 1.5rem;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header h1 {
    margin: 0 0 0.5rem;
    font-size: 1.5rem;
    font-weight: 700;
  }
  header .subtitle {
    margin: 0;
    font-size: 0.85rem;
    opacity: 0.9;
  }
  .progress-wrap {
    margin-top: 1rem;
    background: rgba(255,255,255,0.25);
    border-radius: 999px;
    height: 8px;
    overflow: hidden;
  }
  .progress-bar {
    background: white;
    height: 100%;
    width: 0%;
    transition: width 0.4s ease;
    border-radius: 999px;
  }
  .progress-text {
    margin-top: 0.5rem;
    font-size: 0.8rem;
    opacity: 0.95;
  }
  .container {
    max-width: 800px;
    margin: 0 auto;
    padding: 1rem 1.25rem 4rem;
  }
  .toolbar {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin: 1rem 0 1.5rem;
  }
  .toolbar button {
    flex: 1 1 auto;
    min-width: 100px;
    padding: 0.5rem 0.75rem;
    background: white;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 0.85rem;
    cursor: pointer;
    color: var(--text);
    transition: all 0.15s;
  }
  .toolbar button:hover {
    background: var(--accent-soft);
    border-color: var(--accent);
  }
  .toolbar button.primary {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }
  .toolbar button.primary:hover {
    background: #c5664a;
  }
  .section {
    margin-bottom: 1.5rem;
  }
  .section-header {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px 12px 0 0;
    padding: 0.85rem 1rem;
    font-weight: 600;
    font-size: 0.95rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    user-select: none;
  }
  .section-header .section-progress {
    font-size: 0.8rem;
    color: var(--muted);
    font-weight: 400;
  }
  .section-body {
    background: var(--card);
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 12px 12px;
    overflow: hidden;
  }
  .section.collapsed .section-body { display: none; }
  .section.collapsed .section-header { border-radius: 12px; }
  .item {
    border-top: 1px solid var(--border);
  }
  .item:first-child { border-top: none; }
  .item-header {
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
    padding: 0.85rem 1rem;
    cursor: pointer;
    user-select: none;
  }
  .item-header:hover { background: #fafafa; }
  .item-check {
    flex-shrink: 0;
    width: 22px;
    height: 22px;
    border: 2px solid var(--border);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: white;
    margin-top: 1px;
    transition: all 0.15s;
  }
  .item.done .item-check {
    background: var(--done);
    border-color: var(--done);
  }
  .item.done .item-check::after {
    content: "✓";
    color: white;
    font-weight: 700;
    font-size: 14px;
  }
  .item-title-area {
    flex: 1;
    min-width: 0;
  }
  .item-title {
    font-size: 0.95rem;
    font-weight: 500;
    margin: 0;
  }
  .item.done .item-title {
    text-decoration: line-through;
    color: var(--muted);
  }
  .item-meta {
    margin-top: 0.25rem;
    font-size: 0.75rem;
    color: var(--muted);
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
  }
  .badge {
    display: inline-block;
    padding: 1px 8px;
    border-radius: 999px;
    font-size: 0.7rem;
    font-weight: 600;
  }
  .badge-admin { background: #dbeafe; color: var(--c-admin); }
  .badge-medical { background: #fce7f3; color: var(--c-medical); }
  .badge-work { background: #f3f4f6; color: var(--c-work); }
  .badge-money { background: #fef3c7; color: var(--c-money); }
  .badge-family { background: #d1fae5; color: var(--c-family); }
  .badge-life { background: #ede9fe; color: var(--c-life); }
  .badge-deadline {
    background: #fee2e2;
    color: var(--danger);
  }
  .item-expand {
    flex-shrink: 0;
    color: var(--muted);
    font-size: 0.85rem;
    margin-top: 2px;
    transition: transform 0.2s;
  }
  .item.open .item-expand { transform: rotate(90deg); }
  .item-detail {
    display: none;
    padding: 0.5rem 1rem 1.25rem 3rem;
    font-size: 0.85rem;
    background: #fafaf8;
    border-top: 1px solid var(--border);
  }
  .item.open .item-detail { display: block; }
  .item-detail h4 {
    margin: 1rem 0 0.4rem;
    font-size: 0.8rem;
    text-transform: uppercase;
    color: var(--muted);
    letter-spacing: 0.5px;
  }
  .item-detail h4:first-child { margin-top: 0.5rem; }
  .item-detail ul, .item-detail ol {
    margin: 0.3rem 0;
    padding-left: 1.2rem;
  }
  .item-detail li { margin-bottom: 0.3rem; }
  .item-detail a {
    color: var(--accent);
    text-decoration: none;
    word-break: break-all;
  }
  .item-detail a:hover { text-decoration: underline; }
  .item-detail .note {
    background: #fff8e6;
    border-left: 3px solid var(--warn);
    padding: 0.6rem 0.8rem;
    margin: 0.7rem 0;
    font-size: 0.8rem;
    border-radius: 4px;
  }
  .item-detail .danger-note {
    background: #fee2e2;
    border-left: 3px solid var(--danger);
    padding: 0.6rem 0.8rem;
    margin: 0.7rem 0;
    font-size: 0.8rem;
    border-radius: 4px;
  }
  .who-tag {
    font-size: 0.7rem;
    color: var(--muted);
    background: #f0f0f0;
    padding: 1px 6px;
    border-radius: 999px;
    margin-left: 4px;
  }
  footer {
    text-align: center;
    color: var(--muted);
    font-size: 0.75rem;
    padding: 2rem 1rem;
    border-top: 1px solid var(--border);
    margin-top: 2rem;
  }
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: white;
    border-radius: 12px;
    padding: 1.5rem;
    max-width: 500px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
  }
  .modal h3 { margin-top: 0; }
  .modal textarea {
    width: 100%;
    min-height: 120px;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.5rem;
    font-family: monospace;
    font-size: 0.8rem;
  }
  .modal .modal-actions {
    display: flex;
    gap: 0.5rem;
    margin-top: 1rem;
    justify-content: flex-end;
  }
  .modal button {
    padding: 0.5rem 1rem;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: white;
    cursor: pointer;
    font-size: 0.85rem;
  }
  .modal button.primary {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }
  /* Sync UI */
  .sync-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 0.5rem;
    font-size: 0.75rem;
    opacity: 0.95;
  }
  .sync-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 5px;
    vertical-align: middle;
  }
  .sync-dot.on {
    background: #4ade80;
    animation: blink 2s infinite;
  }
  .sync-dot.off { background: #f87171; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }
  .overlay {
    display: none;
    position: fixed;
    top:0; left:0; right:0; bottom:0;
    background: rgba(0,0,0,0.5);
    z-index: 1000;
    padding: 1rem;
    overflow-y: auto;
  }
  .overlay.show { display: block; }
  .setup-box {
    max-width: 420px;
    margin: 60px auto;
    background: white;
    border-radius: 16px;
    padding: 24px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  }
  .setup-box h2 {
    font-size: 1.15rem;
    font-weight: 700;
    margin: 0 0 0.4rem;
    text-align: center;
  }
  .setup-box p {
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 1rem;
    text-align: center;
    line-height: 1.6;
  }
  .setup-box label {
    font-size: 0.85rem;
    font-weight: 600;
    color: #374151;
    display: block;
    margin: 0.6rem 0 0.3rem;
  }
  .setup-box input {
    width: 100%;
    padding: 0.6rem 0.75rem;
    border: 2px solid var(--border);
    border-radius: 10px;
    font-size: 0.9rem;
    font-family: inherit;
    outline: none;
    margin-bottom: 0.5rem;
  }
  .setup-box input:focus { border-color: var(--accent); }
  .setup-box .btn-primary {
    background: linear-gradient(135deg, #d97757, #e89e7c);
    color: white;
    width: 100%;
    padding: 0.75rem;
    border-radius: 10px;
    font-size: 0.95rem;
    font-weight: 700;
    border: none;
    cursor: pointer;
    margin-top: 0.5rem;
    font-family: inherit;
  }
  .setup-box .btn-secondary {
    background: #f3f4f6;
    color: #374151;
    width: 100%;
    padding: 0.6rem;
    border-radius: 10px;
    font-size: 0.85rem;
    border: none;
    cursor: pointer;
    margin-top: 0.5rem;
    font-family: inherit;
  }
  .setup-box .btn-danger {
    background: #fef2f2;
    color: #dc2626;
  }
  .setup-box .divider {
    height: 1px;
    background: var(--border);
    margin: 1rem 0;
  }
  .setup-box .error-msg {
    background: #fef2f2;
    color: #dc2626;
    padding: 0.5rem;
    border-radius: 8px;
    font-size: 0.8rem;
    margin-bottom: 0.5rem;
    display: none;
  }
  .step-num {
    display: inline-block;
    width: 18px;
    height: 18px;
    background: var(--accent);
    color: white;
    border-radius: 50%;
    text-align: center;
    font-size: 0.7rem;
    line-height: 18px;
    margin-right: 4px;
  }
  .room-code-display {
    font-size: 2rem;
    font-weight: 900;
    letter-spacing: 6px;
    text-align: center;
    color: var(--accent);
    background: var(--accent-soft);
    padding: 1rem;
    border-radius: 12px;
    margin: 1rem 0;
    font-family: monospace;
  }
  .room-code-display.small {
    font-size: 1rem;
    letter-spacing: 2px;
    padding: 0.6rem;
  }
  .copy-btn {
    width: 100%;
    background: #6366f1;
    color: white;
    padding: 0.6rem;
    border-radius: 10px;
    font-size: 0.85rem;
    border: none;
    cursor: pointer;
    font-family: inherit;
  }
  @media print {
    header { position: static; background: none; color: black; }
    .toolbar, footer, .item-expand, .sync-bar { display: none; }
    .item-detail { display: block !important; }
    .section.collapsed .section-body { display: block; }
  }
</style>
</head>
<body>

<header>
  <h1>👶 출산 준비 체크리스트</h1>
  <p class="subtitle">노진명 & 와이프 · 2026년 11월 출산 예정</p>
  <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>
  <p class="progress-text" id="progressText">0 / 0 완료</p>
  <div class="sync-bar">
    <div id="syncStatus"><span class="sync-dot off"></span>오프라인 모드</div>
    <div id="roomInfo"></div>
  </div>
</header>

<div id="setupOverlay" class="overlay"></div>
<div id="roomOverlay" class="overlay"></div>

<div class="container">

<div class="toolbar">
  <button onclick="toggleAll(false)">전체 펼침</button>
  <button onclick="toggleAll(true)">전체 접기</button>
  <button onclick="showExport()">📤 진행상황 공유</button>
  <button onclick="showImport()">📥 가져오기</button>
  <button onclick="resetAll()">↻ 초기화</button>
  <button onclick="window.print()">🖨️ 인쇄</button>
  <button class="primary" onclick="showSetup()">⚙️ 실시간 동기화</button>
</div>

<div id="checklist"></div>

</div>

<footer>
  Made with care · localStorage에 자동 저장됨 · GitHub Pages 호스팅 가능
</footer>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3 id="modalTitle"></h3>
    <p id="modalDesc" style="font-size:0.85rem;color:var(--muted);"></p>
    <textarea id="modalText"></textarea>
    <div class="modal-actions">
      <button onclick="copyModal()">📋 복사</button>
      <button onclick="applyImport()" id="applyBtn" style="display:none">적용</button>
      <button class="primary" onclick="closeModal()">닫기</button>
    </div>
  </div>
</div>

<script>
const CHECKLIST_DATA = [
  {
    title: "🟦 출산 전 (D-40 ~ D-day)",
    items: [
      {
        id: "pre-1",
        title: "산모·신생아 건강관리사(산후도우미) 바우처 신청",
        cats: ["medical"], deadline: "D-40일",
        who: "와이프",
        detail: `
          <h4>왜</h4>
          <p>출산 후 산모와 신생아를 도와줄 건강관리사를 정부 지원으로 이용. 본인부담금이 절반 이하로 줄어듦.</p>

          <p>출산 예정일 <b>40일 전부터 출산 후 60일까지</b>. 이 기간을 놓치면 영구 소멸.</p>
          <h4>방법</h4>
          <ol>
            <li>주민등록 주소지 관할 <b>보건소</b> 방문 또는</li>

          <ul>
            <li>임신확인서 또는 출산예정일 증빙</li>
            <li>건강보험증, 신분증</li>
            <li>가족관계증명서</li>
          </ul>
          <div class="note">바우처 사용 유효기간은 출산일로부터 90일. 가급적 출산 직후 사용 시작.</div>
        `
      },
      {
        id: "pre-2",
        title: "국민행복카드 (임신·출산 진료비 바우처) 발급",
        cats: ["medical","money"], deadline: "D-30일",
        who: "와이프",
        detail: `
          <h4>왜</h4>
          <p>임신·출산 의료비 100만원(단태아) / 140만원(다태아) 지원. 출산 후에도 영아 진료에 사용 가능.</p>

          <h4>사용처</h4>
          <ul>
            <li>요양기관(병원·약국) 진료비·약제비</li>
            <li>분만비, 산후조리원 일부</li>
            <li>2세 이하 영유아 의료기관</li>
          </ul>
          <h4>유효기간</h4>
          <p>출산예정일(또는 출산일)로부터 <b>2년</b>.</p>
        `
      },
      {
        id: "pre-3",
        title: "친환경농산물 임산부 꾸러미 신청",

        who: "와이프",
        detail: `

          <ul>
            <li>관할 시·군·구 보건소 또는 <a href="https://www.ifarmer.kr" target="_blank">친환경꾸러미 사이트</a></li>

          </ul>
          <div class="note">지자체별 운영 여부와 한도가 다를 수 있음. 경기도는 시·군별로 운영 중.</div>
        `
      },
      {
        id: "pre-4",
        title: "모자보건수첩 수령",
        cats: ["medical"], deadline: "임신 중",
        who: "와이프",
        detail: `
          <h4>왜</h4>
          <p>임신·출산·신생아 건강관리 통합 기록 수첩. 출산 후 영유아 건강검진·예방접종 기록에도 사용.</p>
          <h4>방법</h4>
          <p>관할 보건소에서 무료 발급 (건강보험증·신분증 지참).</p>
        `
      },
      {
        id: "pre-5",
        title: "유축기 무상 대여 신청",
        cats: ["medical"], deadline: "임신 중~출산 직후",
        who: "와이프",
        detail: `
          <h4>왜</h4>
          <p>모유수유 가정에 유축기 무상 대여. 비용 수십만원 절감.</p>
          <h4>방법</h4>
          <ul>
            <li>관할 보건소 모자보건실 방문 또는 전화 문의</li>
            <li>지자체별로 대수가 제한되어 선착순 운영</li>
          </ul>
          <p>임신 후기부터 미리 신청 권장.</p>
        `
      },
      {

// ===== State management =====
const STATE_KEY = 'childbirth-checklist-state';
const CONFIG_KEY = 'childbirth-sync-config';
let config = null;
let syncInterval = null;
let lastSyncedJson = '';

function loadState() {
  try { return JSON.parse(localStorage.getItem(STATE_KEY) || '{}'); } catch { return {}; }
}
function saveState(state) {
  localStorage.setItem(STATE_KEY, JSON.stringify(state));
}
function loadConfig() {
  try { const s = localStorage.getItem(CONFIG_KEY); if (s) config = JSON.parse(s); } catch {}
}
function saveConfig() {
  try { localStorage.setItem(CONFIG_KEY, JSON.stringify(config)); } catch {}
}

// ===== Supabase cloud sync =====
async function cloudFetch() {
  if (!config?.url || !config?.key || !config?.room) return null;
  try {
    const r = await fetch(`${config.url}/rest/v1/rooms?code=eq.${config.room}&select=data`, {
      headers: { 'apikey': config.key, 'Authorization': `Bearer ${config.key}` }
    });
    if (!r.ok) return null;
    const d = await r.json();
    return d[0]?.data || null;
  } catch (e) { return null; }
}

async function cloudPush(data) {
  if (!config?.url || !config?.key || !config?.room) return false;
  try {
    const r = await fetch(`${config.url}/rest/v1/rooms?code=eq.${config.room}`, {
      method: 'PATCH',
      headers: {
        'Content-Type': 'application/json',
        'apikey': config.key,
        'Authorization': `Bearer ${config.key}`,
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify({ data, updated_at: new Date().toISOString() })
    });
    return r.ok;
  } catch (e) { return false; }
}

async function cloudCreateRoom(code) {
  if (!config?.url || !config?.key) return false;
  try {
    const state = loadState();
    const r = await fetch(`${config.url}/rest/v1/rooms`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': config.key,
        'Authorization': `Bearer ${config.key}`,
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify({ code, data: state })
    });
    return r.ok;
  } catch (e) { return false; }
}

async function syncFromCloud() {
  const cloud = await cloudFetch();
  if (cloud !== null) {
    const cloudJson = JSON.stringify(cloud);
    if (cloudJson !== lastSyncedJson) {
      // Cloud has newer data — merge in
      const localState = loadState();
      // Preserve local UI state (collapsed sections, open items) by keeping __ keys from local
      const merged = { ...cloud };
      Object.keys(localState).forEach(k => {
        if (k.startsWith('__')) merged[k] = localState[k];
      });
      saveState(merged);
      lastSyncedJson = cloudJson;
      render();
    }
    updateSyncUI(true);
  } else {
    updateSyncUI(false);
  }
}

async function syncToCloud() {
  const state = loadState();
  // Exclude UI state (__ prefixed) from cloud sync
  const cloudState = {};
  Object.keys(state).forEach(k => {
    if (!k.startsWith('__')) cloudState[k] = state[k];
  });
  const ok = await cloudPush(cloudState);
  if (ok) lastSyncedJson = JSON.stringify(cloudState);
  updateSyncUI(ok);
}

function startSync() {
  if (syncInterval) clearInterval(syncInterval);
  syncInterval = setInterval(syncFromCloud, 3000);
  syncFromCloud();
}

function stopSync() {
  if (syncInterval) { clearInterval(syncInterval); syncInterval = null; }
  updateSyncUI(false);
}

function updateSyncUI(connected) {
  const status = document.getElementById('syncStatus');
  const roomInfo = document.getElementById('roomInfo');
  if (!status) return;
  if (connected && config?.room) {
    status.innerHTML = `<span class="sync-dot on"></span>실시간 동기화 중`;
    roomInfo.textContent = `방: ${config.room}`;
  } else if (config?.room) {
    status.innerHTML = `<span class="sync-dot off"></span>연결 끊김 (재시도 중)`;
    roomInfo.textContent = `방: ${config.room}`;
  } else {
    status.innerHTML = `<span class="sync-dot off"></span>오프라인 모드`;
    roomInfo.textContent = '';
  }
}

      <button class="btn-primary" id="setupSaveBtn">저장하고 다음으로</button>
      <div class="divider"></div>
      <button class="btn-secondary" id="setupSkipBtn">⏭ 동기화 없이 사용 (오프라인)</button>
      ${config?.url ? '<button class="btn-secondary btn-danger" id="setupDisconnectBtn">🔌 동기화 해제</button>' : ''}
    </div>
  `;
  document.getElementById('setupSaveBtn').onclick = () => {
    const url = document.getElementById('sbUrl').value.trim().replace(/\/$/, '');
    const key = document.getElementById('sbKey').value.trim();
    if (!url || !key) {
      const e = document.getElementById('setupError');
      e.textContent = 'URL과 Key를 모두 입력해주세요!';
      e.style.display = 'block';
      return;
    }
    config = config || {};
    config.url = url;
    config.key = key;
    saveConfig();
    o.classList.remove('show');
    showRoom();
  };
  document.getElementById('setupSkipBtn').onclick = () => o.classList.remove('show');
  const dc = document.getElementById('setupDisconnectBtn');
  if (dc) dc.onclick = () => {
    if (!confirm('동기화를 해제할까요? 체크 데이터는 로컬에 그대로 남아있어요.')) return;
    config = null;
    localStorage.removeItem(CONFIG_KEY);
    stopSync();
    o.classList.remove('show');
    updateSyncUI(false);
  };
}

function showRoom() {
  const o = document.getElementById('roomOverlay');
  o.classList.add('show');
  o.innerHTML = `
    <div class="setup-box">
      <h2>💑 부부 방 만들기/참여</h2>
      <p>한 명이 방을 만들고,<br>다른 한 명이 같은 코드로 참여하세요!</p>
      <div id="roomError" class="error-msg"></div>
      <button class="btn-primary" id="createRoomBtn">🏠 새 방 만들기 (처음이면)</button>
      <div class="divider"></div>
      <label>또는 방 코드로 참여</label>
      <input id="joinCode" placeholder="예: A3B7K2" maxlength="6" style="text-transform:uppercase;text-align:center;font-size:1.1rem;letter-spacing:4px">
      <button class="btn-primary" id="joinRoomBtn" style="background:linear-gradient(135deg,#3b82f6,#06b6d4)">🔗 참여하기</button>
      <button class="btn-secondary" id="roomBackBtn">← 뒤로</button>
    </div>
  `;
  document.getElementById('createRoomBtn').onclick = async () => {
    const code = Math.random().toString(36).substr(2, 6).toUpperCase();
    const ok = await cloudCreateRoom(code);
    if (!ok) {
      const e = document.getElementById('roomError');
      e.textContent = '방 만들기 실패. URL/Key를 확인해주세요.';
      e.style.display = 'block';
      return;
    }
    config.room = code;
    saveConfig();
    o.innerHTML = `
      <div class="setup-box">
        <h2>✅ 방이 만들어졌어요!</h2>
        <p>아래 코드를 와이프에게 보내주세요!</p>
        <div class="room-code-display">${code}</div>
        <button class="copy-btn" onclick="navigator.clipboard?.writeText('${code}');this.textContent='✅ 복사됨!'">📋 코드 복사</button>
        <button class="btn-primary" style="margin-top:1rem" onclick="document.getElementById('roomOverlay').classList.remove('show');startSync()">🎉 시작하기!</button>
      </div>
    `;
  };
  document.getElementById('joinRoomBtn').onclick = async () => {
    const code = document.getElementById('joinCode').value.trim().toUpperCase();
    if (!code || code.length < 4) {
      const e = document.getElementById('roomError');
      e.textContent = '방 코드를 입력해주세요!';
      e.style.display = 'block';
      return;
    }
    config.room = code;
    saveConfig();
    const cloud = await cloudFetch();
    if (cloud === null) {
      const e = document.getElementById('roomError');
      e.textContent = '방을 찾을 수 없어요. 코드를 확인해주세요.';
      e.style.display = 'block';
      config.room = null;
      saveConfig();
      return;
    }
    // Merge cloud into local, preserving UI state
    const localState = loadState();
    const merged = { ...cloud };
    Object.keys(localState).forEach(k => { if (k.startsWith('__')) merged[k] = localState[k]; });
    saveState(merged);
    lastSyncedJson = JSON.stringify(cloud);
    render();
    o.innerHTML = `
      <div class="setup-box">
        <h2>✅ 연결됐어요!</h2>
        <p>이제 부부 체크리스트가<br>실시간으로 동기화됩니다 💑</p>
        <div class="room-code-display small">방 코드: ${code}</div>
        <button class="btn-primary" onclick="document.getElementById('roomOverlay').classList.remove('show');startSync()">🎉 시작하기!</button>
      </div>
    `;
  };
  document.getElementById('roomBackBtn').onclick = () => {
    o.classList.remove('show');
    showSetup();
  };
}

// ===== Render =====
function render() {
  const state = loadState();
  const root = document.getElementById('checklist');
  root.innerHTML = '';
  let totalCount = 0, doneCount = 0;
  CHECKLIST_DATA.forEach((section, sIdx) => {
    const sectionEl = document.createElement('div');
    sectionEl.className = 'section' + (state['__collapsed_' + sIdx] ? ' collapsed' : '');
    let sDone = 0, sTotal = section.items.length;
    totalCount += sTotal;
    section.items.forEach(item => { if (state[item.id]) { sDone++; doneCount++; } });
    sectionEl.innerHTML = `
      <div class="section-header" onclick="toggleSection(${sIdx})">
        <span>${section.title}</span>
        <span class="section-progress">${sDone}/${sTotal}</span>
      </div>
      <div class="section-body">
        ${section.items.map(item => `
          <div class="item ${state[item.id] ? 'done' : ''} ${state['__open_' + item.id] ? 'open' : ''}" data-id="${item.id}">
            <div class="item-header" onclick="toggleItem('${item.id}', event)">
              <div class="item-check" onclick="event.stopPropagation(); toggleCheck('${item.id}')"></div>
              <div class="item-title-area">
                <p class="item-title">${item.title} ${item.who ? `<span class="who-tag">${item.who}</span>` : ''}</p>
                <div class="item-meta">
                  ${item.cats.map(c => `<span class="badge badge-${c}">${catLabel(c)}</span>`).join('')}
                  ${item.deadline ? `<span class="badge badge-deadline">⏰ ${item.deadline}</span>` : ''}
                </div>
              </div>
              <span class="item-expand">▶</span>
            </div>
            <div class="item-detail">${item.detail}</div>
          </div>
        `).join('')}
      </div>
    `;
    root.appendChild(sectionEl);
  });
  // Update overall progress
  const pct = totalCount > 0 ? (doneCount / totalCount * 100) : 0;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${doneCount} / ${totalCount} 완료 (${Math.round(pct)}%)`;
}

function catLabel(c) {
  return {admin:'행정', medical:'의료', work:'회사', money:'금융', family:'가족', life:'생활'}[c] || c;
}

function toggleCheck(id) {
  const state = loadState();
  state[id] = !state[id];
  if (!state[id]) delete state[id];
  saveState(state);
  render();
  if (config?.room) syncToCloud();
}

function toggleItem(id, event) {
  if (event.target.closest('.item-check')) return;
  const state = loadState();
  state['__open_' + id] = !state['__open_' + id];
  saveState(state);
  render();
}

function toggleSection(sIdx) {
  const state = loadState();
  state['__collapsed_' + sIdx] = !state['__collapsed_' + sIdx];
  saveState(state);
  render();
}

function toggleAll(collapse) {
  const state = loadState();
  CHECKLIST_DATA.forEach((_, sIdx) => state['__collapsed_' + sIdx] = collapse);
  saveState(state);
  render();
}

function resetAll() {
  if (!confirm('정말 모든 체크 상태를 초기화할까요?')) return;
  localStorage.removeItem(STATE_KEY);
  render();
  if (config?.room) syncToCloud();
}

// ===== Share / Import =====
function showExport() {
  const state = loadState();
  const checkedIds = Object.keys(state).filter(k => !k.startsWith('__') && state[k]);
  const exportData = { v: 1, checked: checkedIds, ts: new Date().toISOString().slice(0,10) };
  const text = JSON.stringify(exportData);
  showModal('진행상황 공유', '아래 텍스트를 복사해서 와이프에게 보내세요. 와이프는 "가져오기"로 적용할 수 있어요.', text, false);
}

function showImport() {
  showModal('진행상황 가져오기', '와이프(또는 다른 기기)에서 받은 텍스트를 붙여넣고 "적용"을 누르세요.', '', true);
}

function showModal(title, desc, text, isImport) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalDesc').textContent = desc;
  document.getElementById('modalText').value = text;
  document.getElementById('modalText').readOnly = !isImport;
  document.getElementById('applyBtn').style.display = isImport ? 'inline-block' : 'none';
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
}

function copyModal() {
  const text = document.getElementById('modalText').value;
  navigator.clipboard.writeText(text).then(() => {
    alert('복사됨!');
  }).catch(() => {
    document.getElementById('modalText').select();
    document.execCommand('copy');
    alert('복사됨!');
  });
}

function applyImport() {
  try {
    const data = JSON.parse(document.getElementById('modalText').value);
    if (!data.checked || !Array.isArray(data.checked)) throw new Error('형식 오류');
    if (!confirm(`가져온 데이터(${data.checked.length}개 항목 체크됨, ${data.ts || '?'}일자)를 적용할까요?\n기존 체크 상태는 병합됩니다.`)) return;
    const state = loadState();
    data.checked.forEach(id => state[id] = true);
    saveState(state);
    render();
    if (config?.room) syncToCloud();
    closeModal();
    alert('적용 완료!');
  } catch (e) {
    alert('잘못된 형식입니다: ' + e.message);
  }
}

// ===== Initial load =====
loadConfig();
render();
if (config?.url && config?.key && config?.room) {
  startSync();
} else {
  updateSyncUI(false);
}
</script>
</body>
</html>
